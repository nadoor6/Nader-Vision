<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NADER VISION · Aleppo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Inter: Bold Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main class="center-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">NADER VISION</div>
            <div class="location">📍 ALEPPO, SYRIA</div>
        </div>

        <div class="divider"></div>

        <!-- Hero -->
        <h1 class="hero-text">
            Rebuilding begins<br>with a single foundation.
        </h1>

        <p class="subhead-text">
            I'm Nader. 18. In my final year of high school.<br> This is the starting line of the new Syrian skyline.
        </p>

        <!-- Status Countdown -->
        <div class="status-group">
            <div class="status-item">
                <span class="label">FOCUS MODE</span>
                <span class="value">FINALS IN <span id="countdown-timer">--</span></span>
            </div>
            <div class="status-item">
                <span class="label">CURRENT CHAPTER</span>
                <span class="value">STUDENT · DEVELOPER</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="social-links">
                <a href="https://x.com/iiiiinader" target="_blank">X/TWITTER</a>
                <a href="https://instagram.com/iiiiinader" target="_blank">INSTAGRAM</a>
            </div>
            <div class="copyright">© 2026 NADER VISION · DOCUMENTING THE RISE</div>
        </div>
    </main>

    <script>
        // Update with your actual exam date
        var countDownDate = new Date("June 10, 2026 00:00:00").getTime();
        var x = setInterval(function() {
            var now = new Date().getTime();
            var distance = countDownDate - now;
            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
            if (days > 0) {
                document.getElementById("countdown-timer").innerHTML = days + " DAYS";
            } else {
                document.getElementById("countdown-timer").innerHTML = "EXAM TIME";
            }
        }, 1000);
    </script>
</body>

</html>
