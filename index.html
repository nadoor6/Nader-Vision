<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NADER VISION · Aleppo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Inter: Bold Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main class="center-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">NADER VISION</div>
            <div class="location">📍 ALEPPO, SYRIA</div>
        </div>

        <div class="divider"></div>

        <!-- Hero -->
        <h1 class="hero-text">
            Rebuilding begins<br>with a single foundation.
        </h1>

        <p class="subhead-text">
            I'm Nader. 18. In my final year of high school.<br> This is the starting line of the new Syrian skyline.
        </p>

        <!-- Status Countdown -->
        <div class="status-group">
            <div class="status-item">
                <span class="label">FOCUS MODE</span>
                <span class="value" id="countdown-timer">--</span>
            </div>
            <div class="status-item">
                <span class="label">CURRENT CHAPTER</span>
                <span class="value">STUDENT · DEVELOPER</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="social-links">
                <a href="https://x.com/iiiiinader" target="_blank">X/TWITTER</a>
                <a href="https://instagram.com/iiiiinader" target="_blank">INSTAGRAM</a>
            </div>
            <div class="copyright">© 2026 NADER VISION · DOCUMENTING THE RISE</div>
        </div>
    </main>

    <script>
        // Set the target date: June 6, 2026 at 00:00:00 local time
        // Using local time string to ensure accuracy based on user's timezone
        const targetDate = new Date("June 6, 2026 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown-timer").innerHTML = "EXAM TIME";
                return;
            }

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Format with leading zeros
            const formattedHours = hours.toString().padStart(2, '0');
            const formattedMinutes = minutes.toString().padStart(2, '0');
            const formattedSeconds = seconds.toString().padStart(2, '0');

            // Display
            document.getElementById("countdown-timer").innerHTML =
                `${days}D ${formattedHours}H ${formattedMinutes}M ${formattedSeconds}S`;
        }

        // Update immediately and then every second
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>

</html>
