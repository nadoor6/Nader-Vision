<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NADER VISION · Aleppo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Swiss Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="grid-container">
        <!-- Header: Positioned in specific grid cells -->
        <div class="grid-header-logo">NADER VISION</div>
        <div class="grid-header-location">📍 ALEPPO, SYRIA</div>

        <!-- Divider Line (Spans columns) -->
        <div class="grid-divider"></div>

        <!-- Main Content -->
        <div class="grid-hero">
            <h1>Rebuilding begins with a single foundation.</h1>
        </div>

        <div class="grid-subhead">
            <p>I'm Nader. 18. In my final year of high school. This is the starting line of the new Syrian skyline.</p>
        </div>

        <!-- Status Block -->
        <div class="grid-status-label-1">FOCUS MODE</div>
        <div class="grid-status-value-1">FINALS IN <span id="countdown-timer">--</span></div>

        <div class="grid-status-label-2">CURRENT CHAPTER</div>
        <div class="grid-status-value-2">STUDENT · DEVELOPER</div>

        <!-- Footer Links -->
        <div class="grid-footer-links">
            <a href="https://x.com/iiiiinader" target="_blank">X/TWITTER</a>
            <a href="https://instagram.com/iiiiinader" target="_blank">INSTAGRAM</a>
        </div>
        <div class="grid-footer-copyright">© 2026 NADER VISION</div>
    </div>

    <script>
        var countDownDate = new Date("June 10, 2026 00:00:00").getTime();
        var x = setInterval(function() {
            var now = new Date().getTime();
            var distance = countDownDate - now;
            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
            if (days > 0) {
                document.getElementById("countdown-timer").innerHTML = days + " DAYS";
            } else {
                document.getElementById("countdown-timer").innerHTML = "EXAM TIME";
            }
        }, 1000);
    </script>
</body>

</html>
